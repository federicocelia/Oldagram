<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Instagram-style post layout built with HTML, CSS, and JavaScript."
    />

    <title>Oldagram</title>
    <!-- Styles -->
    <link rel="stylesheet" href="./index.css" />
    <!-- Optional favicon -->
    <link rel="icon" href="./images/favicon/favicon.ico" />
    <link rel="icon" href="./images/favicon/favicon.svg" type="image/svg+xml" />
  </head>
  <body>
    <header class="header">
      <div class="img-wrapper">
        <img src="images/logo.png" alt="Oldagram logo" class="logo" />
      </div>
      <div class="img-wrapper">
        <img
          src="./images/user-avatar.jpg"
          alt="user-avatar-picture"
          class="avatar profile-picture"
        />
      </div>
    </header>

    <main id="posts-container">
      <!-- Posts Dynamically rendered here by JavaScript -->
    </main>

    <!-- JavaScript -->
    <script src="./scripts/index.js" type="module" defer></script>
  </body>
</html>
